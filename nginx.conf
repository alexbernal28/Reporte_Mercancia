events {}

http {
    upstream backend {
        least_conn;

        server app1:3000 max_fails=3 fail_timeout=10s;
        server app2:3000 max_fails=3 fail_timeout=10s;
        server app3:3000 max_fails=3 fail_timeout=10s;
        server app4:3000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend;

            #Define cuano intentar otro servidor
            proxy_next_upstream error timeout http_502 http_503 http_504;

            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
            proxy_send_timeout 15s;

            # Envía el dominio original al backend
            proxy_set_header Host $host;

            #Envía la IP real del cliente
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}