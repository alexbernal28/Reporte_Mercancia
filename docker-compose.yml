version: "3.8"

services:

  nginx:
    image: nginx:latest
    container_name: nginx_lb
    ports:
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
      - app3
      - app4

  app1:
    build: .
    container_name: node_app1
    volumes:
      - ./src:/app
      - /app/node_modules
    environment:
      - DB_URL=${DB_URL}
      - JWT_SECRET=${JWT_SECRET}
      - APP_NAME=app1
    depends_on:
      - postgres
    env_file:
      - .env

  app2:
    build: .
    container_name: node_app2
    volumes:
      - ./src:/app
      - /app/node_modules
    environment:
      - DB_URL=${DB_URL}
      - JWT_SECRET=${JWT_SECRET}
      - APP_NAME=app2
    depends_on:
      - postgres
    env_file:
      - .env

  app3:
    build: .
    container_name: node_app3
    volumes:
      - ./src:/app
      - /app/node_modules
    environment:
      - DB_URL=${DB_URL}
      - JWT_SECRET=${JWT_SECRET}
      - APP_NAME=app3
    depends_on:
      - postgres
    env_file:
      - .env

  app4:
    build: .
    container_name: node_app4
    volumes:
      - ./src:/app
      - /app/node_modules
    environment:
      - DB_URL=${DB_URL}
      - JWT_SECRET=${JWT_SECRET}
      - APP_NAME=app4
    depends_on:
      - postgres
    env_file:
      - .env

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # backup:
  #   image: postgres:15
  #   container_name: postgres_backup
  #   depends_on:
  #     - postgres
  #   volumes:
  #     - ./backups:/backups
  #   environment:
  #     - POSTGRES_USER=${POSTGRES_USER}
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
  #     - POSTGRES_DB=${POSTGRES_DB}
  #     - PGPASSWORD=${POSTGRES_PASSWORD}
  #   entrypoint: >
  #     sh -c "
  #     apt-get update && apt-get install -y zip cron &&
  #     echo '* * * * * pg_dump -h postgres -U $${POSTGRES_USER} $${POSTGRES_DB} > /backups/backup.sql && zip /backups/backup_$(date +\%Y\%m\%d_\%H\%M).zip /backups/backup.sql 2>> /backups/error.log' > /etc/cron.d/backup-cron &&
  #     chmod 0644 /etc/cron.d/backup-cron &&
  #     crontab /etc/cron.d/backup-cron &&
  #     cron -f
  #     "
  
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    command: tunnel --no-autoupdate --url http://host.docker.internal:5678

volumes:
  postgres_data:
  n8n_data: